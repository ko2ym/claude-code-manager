name: ClaudeCodeManager
options:
  bundleIdPrefix: com.ccm
  deploymentTarget:
    macOS: "14.0"
  defaultConfig: Debug
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  ClaudeCodeManager:
    type: application
    platform: macOS
    sources:
      - path: ClaudeCodeManager
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ccm.app
        PRODUCT_NAME: ClaudeCodeManager
        INFOPLIST_FILE: ClaudeCodeManager/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeCodeManager/Resources/ClaudeCodeManager.entitlements
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
